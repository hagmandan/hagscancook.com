# Firebase App Hosting configuration (Cloud Run backend).
# See https://firebase.google.com/docs/app-hosting/configure

runConfig:
  runtime: nodejs20
  cpu: 1
  memoryMiB: 1024
  concurrency: 20
  minInstances: 0
  maxInstances: 5

env:
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - RUNTIME

  - variable: DIRECT_URL
    secret: DIRECT_URL
    availability:
      - RUNTIME
      - BUILD

  - variable: FIREBASE_SERVICE_ACCOUNT_KEY
    secret: FIREBASE_SERVICE_ACCOUNT_KEY
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_SENTRY_DSN
    secret: NEXT_PUBLIC_SENTRY_DSN
    availability:
      - RUNTIME

  - variable: NEXT_PUBLIC_APP_ENV
    value: production
    availability:
      - RUNTIME
      - BUILD

  - variable: SENTRY_AUTH_TOKEN
    secret: SENTRY_AUTH_TOKEN
    availability:
      - BUILD
