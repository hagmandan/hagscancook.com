name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
      NEXT_PUBLIC_APP_ENV: test
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_PUBLIC_FIREBASE_API_KEY: ci
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:ci"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test --run

      - name: Build
        run: yarn build
